<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9AA0A6;
        }
        .search-input:focus {
            outline: none;
        }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 flex flex-col items-center justify-center min-h-screen p-4">

    <div id="main-content" class="text-center w-full max-w-2xl">
        <!-- Google Logo -->
        <h1 class="text-6xl md:text-8xl font-bold mb-8">
            <span class="text-blue-600">G</span>
            <span class="text-red-500">o</span>
            <span class="text-yellow-400">o</span>
            <span class="text-blue-600">g</span>
            <span class="text-green-500">l</span>
            <span class="text-red-500">e</span>
        </h1>

        <!-- Search Bar -->
        <div class="relative w-full mx-auto mb-6">
            <div class="search-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
            </div>
            <input type="text" id="searchInput" class="search-input bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 rounded-full w-full py-3 pl-12 pr-4 text-gray-900 dark:text-gray-100 focus:border-blue-500 focus:ring-blue-500 transition duration-300" placeholder="Search Google or type a URL">
        </div>

        <!-- Search Buttons -->
        <div class="flex items-center justify-center space-x-4">
            <button id="searchButton" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 font-semibold py-2 px-4 rounded-lg transition duration-300">
                Google Search
            </button>
            <button id="luckyButton" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 font-semibold py-2 px-4 rounded-lg transition duration-300">
                I'm Feeling Lucky
            </button>
        </div>
    </div>

    <!-- Results Container -->
    <div id="results" class="mt-12 w-full max-w-3xl text-left">
        <!-- Special content will be injected here -->
    </div>

    <script>
        // --- DOM Element References ---
        const searchInput = document.getElementById('searchInput');
        const searchButton = document.getElementById('searchButton');
        const luckyButton = document.getElementById('luckyButton');
        const resultsContainer = document.getElementById('results');
        const mainContent = document.getElementById('main-content');

        // --- Event Handlers ---
        
        /**
         * Executes the search logic based on the input value.
         */
        function performSearch() {
            const query = searchInput.value.trim().toLowerCase();

            // The special search term we are looking for
            const specialQuery = 'cutest creature on earth';

            if (query === specialQuery) {
                // If the query matches, show our special panda content
                displaySpecialContent();
            } else if (query) {
                // For any other query, redirect to actual Google search results
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }
        
        /**
         * Handles the "I'm Feeling Lucky" functionality.
         * For the special query, it shows the panda. Otherwise, it would typically
         * redirect to the first result, but for simplicity, we'll just do a regular search.
         */
        function feelingLucky() {
             const query = searchInput.value.trim().toLowerCase();
             if (query === 'cutest creature on earth') {
                displaySpecialContent();
             } else if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}&btnI`;
             }
        }

        /**
         * Displays the special panda image and romantic description.
         */
        function displaySpecialContent() {
            // Hide the main logo and search bar area
            mainContent.style.display = 'none';

            // Clear any previous results
            resultsContainer.innerHTML = '';

            // Create the container for the special result
            const specialResult = document.createElement('div');
            specialResult.className = 'bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg animate-fade-in';
            
            // Create the image element
            const pandaImage = document.createElement('img');
            pandaImage.src = 'cute.jpg';
            pandaImage.alt = 'Cute Panda';
            pandaImage.className = 'w-full h-auto max-w-md mx-auto rounded-xl shadow-md mb-6';
            pandaImage.onerror = () => {
                // In case the image fails to load, show a placeholder
                pandaImage.src = 'https://placehold.co/600x400/e2e8f0/64748b?text=Cute+Panda+Here!';
            };

            // Create the description element
            const description = document.createElement('p');
            description.className = 'text-lg text-gray-700 dark:text-gray-300 leading-relaxed text-center';
            description.innerHTML = `Just like this little panda, you've tumbled into my world and made everything ridiculously adorable. My heart does a happy little wiggle every time I think of you. You're rarer and more precious than any bamboo forest, and frankly, <strong>you're the cutest creature I've ever known.</strong>`;

            // Append elements to the container
            specialResult.appendChild(pandaImage);
            specialResult.appendChild(description);
            resultsContainer.appendChild(specialResult);
            
            // Add a little fade-in animation
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes fade-in {
                    from { opacity: 0; transform: translateY(20px); }
                    to { opacity: 1; transform: translateY(0); }
                }
                .animate-fade-in {
                    animation: fade-in 0.7s ease-out forwards;
                }
            `;
            document.head.appendChild(style);
        }

        // --- Event Listeners ---
        
        // Listen for clicks on the search button
        searchButton.addEventListener('click', performSearch);
        
        // Listen for clicks on the "I'm Feeling Lucky" button
        luckyButton.addEventListener('click', feelingLucky);

        // Listen for 'Enter' key press in the input field
        searchInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                performSearch();
            }
        });
    </script>

</body>
</html>
